packages:
  - ./
  - .playground/

catalogs:
  cli:
    '@antfu/eslint-config': ^6.7.3
    '@antfu/ni': ^27.0.1
    bumpp: ^10.4.1
    eslint: ^9.39.4
    tsdown: ^0.21.5
    typescript: ^5.9.3
    vite: ^7.3.1
  inlined:
    '@antfu/utils': ^9.3.0
  playground:
    nuxt: ^4.4.2
    vue: ^3.5.31
    vue-router: ^4.6.4
  types:
    '@types/node': ^24.12.0

ignoreWorkspaceRootCheck: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild

overrides:
  brace-expansion@<5.0.5: '>=5.0.5'
  serialize-javascript@<=7.0.2: '>=7.0.3'

shellEmulator: true
